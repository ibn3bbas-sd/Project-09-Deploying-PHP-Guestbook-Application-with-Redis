<svg viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="1100" height="680" fill="#0f1117" rx="12"/>
  
  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0" letter-spacing="1">PHP Guestbook · Kubernetes Architecture</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748b">Stateless Application with Redis Replication</text>

  <!-- ===== OCI Region Box ===== -->
  <rect x="280" y="65" width="790" height="590" rx="10" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="300" y="58" width="100" height="18" rx="4" fill="#1e293b"/>
  <text x="350" y="71" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600">OCI Region</text>

  <!-- ===== OKE Box ===== -->
  <rect x="300" y="430" width="750" height="200" rx="8" fill="#14532d" fill-opacity="0.3" stroke="#16a34a" stroke-width="1.5"/>
  <text x="675" y="618" text-anchor="middle" font-size="13" font-weight="700" fill="#4ade80">Container Engine for Kubernetes (OKE)</text>

  <!-- ===== LEARNER ===== -->
  <circle cx="60" cy="300" r="22" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <text x="60" y="306" text-anchor="middle" font-size="20">👤</text>
  <rect x="20" y="330" width="80" height="24" rx="5" fill="#475569"/>
  <text x="60" y="347" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Learner</text>

  <!-- ① HTTP Arrow learner → LB — "HTTP Traffic" moved fully above the line -->
  <line x1="105" y1="300" x2="185" y2="300" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="145" y="290" text-anchor="middle" font-size="10" fill="#93c5fd">HTTP Traffic</text>

  <!-- ② OCI Load Balancer — label on one line -->
  <rect x="190" y="272" width="95" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="237" cy="288" r="9" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <line x1="237" y1="279" x2="237" y2="297" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="228" y1="288" x2="246" y2="288" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="237" y="320" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">OCI Load Balancer</text>

  <!-- Arrow LB → Frontend Service -->
  <line x1="285" y1="300" x2="370" y2="300" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ③ FRONTEND SERVICE — taller rect so all text fits centered inside -->
  <rect x="375" y="272" width="130" height="58" rx="8" fill="#4c1d95" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="440" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#c4b5fd">Frontend</text>
  <text x="440" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#c4b5fd">Service</text>
  <text x="440" y="320" text-anchor="middle" font-size="8" fill="#a78bfa">ClusterIP / LoadBalancer</text>

  <!-- Arrows Frontend Service → Frontend Pods -->
  <line x1="405" y1="272" x2="380" y2="175" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <line x1="440" y1="272" x2="450" y2="175" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <line x1="475" y1="272" x2="520" y2="175" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- ===== FRONTEND PODS ===== -->
  <text x="460" y="105" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">replicas: 3</text>

  <rect x="330" y="115" width="95" height="55" rx="8" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="343" y="124" width="70" height="30" rx="5" fill="#6d28d9"/>
  <text x="378" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pod</text>
  <text x="378" y="162" text-anchor="middle" font-size="9" fill="#c4b5fd">Guestbook</text>

  <rect x="435" y="115" width="95" height="55" rx="8" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="448" y="124" width="70" height="30" rx="5" fill="#6d28d9"/>
  <text x="483" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pod</text>
  <text x="483" y="162" text-anchor="middle" font-size="9" fill="#c4b5fd">Guestbook</text>

  <rect x="540" y="115" width="95" height="55" rx="8" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="553" y="124" width="70" height="30" rx="5" fill="#6d28d9"/>
  <text x="588" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pod</text>
  <text x="588" y="162" text-anchor="middle" font-size="9" fill="#c4b5fd">Guestbook</text>

  <!-- ===== REDIS LEADER SERVICE ===== -->
  <rect x="640" y="276" width="120" height="48" rx="8" fill="#7c2d12" stroke="#ea580c" stroke-width="1.5"/>
  <text x="700" y="297" text-anchor="middle" font-size="11" font-weight="700" fill="#fed7aa">Redis-leader</text>
  <text x="700" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="#fed7aa">Service</text>
  <text x="700" y="324" text-anchor="middle" font-size="8" fill="#fdba74">ClusterIP · port 6379</text>

  <!-- ④ Arrow Frontend → Redis leader (write) with circle 3 above "write" -->
  <line x1="505" y1="293" x2="640" y2="293" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <circle cx="572" cy="272" r="10" fill="#ea580c"/>
  <text x="572" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
  <text x="572" y="287" text-anchor="middle" font-size="9" fill="#fb923c">write</text>

  <!-- Arrow Redis leader Service → Redis leader Pod -->
  <line x1="700" y1="276" x2="700" y2="175" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <!-- ===== REDIS LEADER POD ===== -->
  <text x="700" y="105" text-anchor="middle" font-size="10" fill="#ea580c" font-style="italic">replicas: 1</text>
  <rect x="653" y="115" width="95" height="55" rx="8" fill="#431407" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="666" y="124" width="70" height="30" rx="5" fill="#c2410c"/>
  <text x="701" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pod</text>
  <text x="701" y="162" text-anchor="middle" font-size="9" fill="#fed7aa">Redis-leader</text>

  <!-- ⑥ REDIS FOLLOWER SERVICE — taller rect so all text fits centered inside -->
  <rect x="830" y="272" width="120" height="58" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="890" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">Redis-follower</text>
  <text x="890" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">Service</text>
  <text x="890" y="320" text-anchor="middle" font-size="8" fill="#86efac">ClusterIP · port 6379</text>

  <!-- ⑤ Green arrow — curves DOWNWARD to avoid Redis-leader Service -->
  <path d="M505,307 Q667,400 830,307" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- Circle 4 and "read" centred on the curve bottom (midpoint ≈ 667,353) -->
  <circle cx="667" cy="345" r="10" fill="#22c55e"/>
  <text x="667" y="349" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>
  <text x="667" y="365" text-anchor="middle" font-size="9" fill="#4ade80">read</text>

  <!-- Arrow Redis follower Service → Follower Pods -->
  <line x1="870" y1="272" x2="830" y2="175" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <line x1="910" y1="272" x2="940" y2="175" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- ===== REDIS FOLLOWER PODS ===== -->
  <text x="880" y="105" text-anchor="middle" font-size="10" fill="#22c55e" font-style="italic">replicas: 2</text>

  <rect x="780" y="115" width="95" height="55" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="793" y="124" width="70" height="30" rx="5" fill="#15803d"/>
  <text x="828" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pod</text>
  <text x="828" y="162" text-anchor="middle" font-size="9" fill="#bbf7d0">Redis-follower</text>

  <rect x="890" y="115" width="95" height="55" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="903" y="124" width="70" height="30" rx="5" fill="#15803d"/>
  <text x="938" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pod</text>
  <text x="938" y="162" text-anchor="middle" font-size="9" fill="#bbf7d0">Redis-follower</text>

  <!-- Replication arrow leader → follower -->
  <path d="M748 135 C770 95 790 95 805 115" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowAmber)"/>
  <text x="785" y="88" text-anchor="middle" font-size="9" fill="#fbbf24">replicate</text>

  <!-- ===== Workflow Numbers (only 1 and 2 remain here; 3 and 4 moved inline above) ===== -->
  <circle cx="148" cy="275" r="10" fill="#3b82f6"/>
  <text x="148" y="279" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>

  <circle cx="330" cy="271" r="10" fill="#7c3aed"/>
  <text x="330" y="275" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>

  <!-- ===== LEGEND ===== -->
  <rect x="320" y="440" width="710" height="170" rx="6" fill="#0f172a" fill-opacity="0.6"/>
  <text x="675" y="462" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">WORKFLOW</text>

  <text x="340" y="486" font-size="11" fill="#60a5fa">① User</text>
  <text x="390" y="486" font-size="11" fill="#e2e8f0">sends HTTP request → OCI Load Balancer distributes traffic</text>

  <text x="340" y="508" font-size="11" fill="#a78bfa">② Frontend Service</text>
  <text x="454" y="508" font-size="11" fill="#e2e8f0">routes to one of 3 Guestbook Pods (PHP app)</text>

  <text x="340" y="530" font-size="11" fill="#fb923c">③ Write path</text>
  <text x="415" y="530" font-size="11" fill="#e2e8f0">Guestbook Pod → Redis-leader Service → Redis-leader Pod</text>

  <text x="340" y="552" font-size="11" fill="#4ade80">④ Read path</text>
  <text x="410" y="552" font-size="11" fill="#e2e8f0">Guestbook Pod → Redis-follower Service → Redis-follower Pods</text>

  <text x="340" y="574" font-size="11" fill="#fbbf24">⑤ Replication</text>
  <text x="425" y="574" font-size="11" fill="#e2e8f0">Redis-leader asynchronously replicates to 2 Redis-follower Pods</text>

  <rect x="335" y="585" width="680" height="16" rx="3" fill="#1e293b"/>
  <text x="675" y="597" text-anchor="middle" font-size="10" fill="#64748b">Dashed borders = Pods managed by Deployments  ·  Solid borders = Kubernetes Services</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>