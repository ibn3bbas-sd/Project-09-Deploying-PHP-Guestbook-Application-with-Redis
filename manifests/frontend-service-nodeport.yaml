# Frontend Service - NodePort type (for local environments)
# Use this for Minikube, iximiuz Labs, Killercoda, or KodeKloud playgrounds.
# For cloud-managed clusters (OKE), use frontend-service-loadbalancer.yaml instead.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: test
  labels:
    app: guestbook
    tier: frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  selector:
    app: guestbook
    tier: frontend
